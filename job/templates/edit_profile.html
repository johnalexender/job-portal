{% extends 'job/base.html' %}
{% block content %}

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card border-0 shadow-sm p-4">

                <!-- HEADER -->
                <div class="d-flex justify-content-between align-items-center mb-4">

                    <h4 class="fw-bold mb-0">✏ Edit Profile</h4>

                    <!-- BACK BUTTON -->
                    <a href="{% url 'profile' %}" class="btn btn-outline-secondary btn-sm">
                        ⬅ Back to Profile
                    </a>

                </div>

                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}

                    <!-- PHONE -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">📞 Phone</label>
                        <input type="text"
                               name="phone"
                               value="{{ profile.phone }}"
                               class="form-control form-control-lg"
                               placeholder="Enter phone number">
                    </div>

                    <!-- ADDRESS -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">📍 Address</label>
                        <textarea name="address"
                                  class="form-control form-control-lg"
                                  rows="2"
                                  placeholder="Enter address">{{ profile.address }}</textarea>
                    </div>

                    <!-- SKILLS -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">🧠 Skills</label>
                        <textarea name="skills"
                                  class="form-control form-control-lg"
                                  rows="3"
                                  placeholder="e.g. Python, Django, SQL">{{ profile.skills }}</textarea>
                    </div>

                    <!-- EDUCATION -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">🎓 Education</label>
                        <textarea name="education"
                                  class="form-control form-control-lg"
                                  rows="3"
                                  placeholder="Your education details">{{ profile.education }}</textarea>
                    </div>

                    <!-- EXPERIENCE -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">💼 Experience</label>
                        <textarea name="experience"
                                  class="form-control form-control-lg"
                                  rows="3"
                                  placeholder="Work experience">{{ profile.experience }}</textarea>
                    </div>

                    <!-- IMAGE -->
                    <div class="mb-4">
                        <label class="form-label fw-semibold">🖼 Profile Image</label>
                        <input type="file" name="image" class="form-control form-control-lg">
                    </div>

                    <!-- BUTTONS -->
                    <div class="d-flex gap-2">

                        <button type="submit" class="btn btn-success btn-lg w-100">
                            💾 Save Changes
                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
